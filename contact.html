<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
</head>
<body>

    <header>
        <h1>Contact Me</h1>
        <nav>
            <a href="index.html">Home</a> | 
            <a href="about.html">About</a> | 
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section>
        <h2>Contact Form</h2>

        <form action="#" method="GET">
            <div>
                <label for="name">Name:</label>
                <input type="text" id="name" required>
            </div>

            <div>
                <label for="email">Email:</label>
                <input type="email" id="email">
            </div>

            <div>
                <label>Gender:</label>
                
                <input type="radio" name="gender" id="male">
                <label for="male">Male</label>

                <input type="radio" name="gender" id="female">
                <label for="female">Female</label>
            </div>

            <div>
                <input type="checkbox" id="subscribe">
                <label for="subscribe">Subscribe to newsletter</label>
            </div>

            <div>
                <label for="satisfaction">Satisfaction Level:</label>
                <input type="range" id="satisfaction" min="1" max="10">
            </div>

            <div>
                <button type="submit">Submit</button>
                <button type="button">Cancel</button>
            </div>

        </form>
    </section>
    
    <section id="social-links">
        <h2>Connect With Me</h2>
        <a href="https://github.com/amen-meb" target="_blank" title="Visit my GitHub Profile">GitHub</a> | 
        <a href="https://linkedin.com" target="_blank" title="Visit my LinkedIn Profile">LinkedIn</a> |
        <a href="https://t.me/amen_meb" target="_blank" title="Message me on Telegram">Telegram</a>
    </section>

    <footer>
        <p>&copy; All rights reserved.</p>
    </footer>

</body>
</html>
